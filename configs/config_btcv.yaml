data:
  dataset: "BTCV"
  data_dir: "../medopenseg/datasets/BTCV/"
  split_json: "swin_unetr_btcv_dataset_0.json"

model:
  in_channels: 1
  out_channels: 11  # Background (0) + 10 Known Organs
  feature_size: 48  
  embed_dim_final: 128 

training:
  batch_size: 2
  lr: 1e-4
  max_iterations: 43000
  eval_num: 100  # Runs validation every 100 epochs (approx 1200 steps)
  checkpoint_dir: "./outputs/btcv/btcv_fix2"
  pretrained_weights: "./weights/model_swinvit.pt"

  resume: True 

  vmf:
    tau: 1.0
    reject_weight: 0.2

    # Fix 2: Background MUST be excluded from vMF attraction/loss.
    # Including it forces the backbone to model background in hyperspherical space,
    # which creates a shallow well that can "swallow" unseen structures and suppress
    # their free energy — breaking OOD detection.
    include_background_loss: False
    # Fix 2: Exclude background from free energy query (Eq. 7).
    # Ensures unseen structures are not explained away by the broad background well.
    include_background_query: False

    # Schedule in STEPS
    warmup_steps: 9600      # ~epoch 800 (Pure Segmentation + Silent Memory Update)
    ramp_steps: 4800        # Longer ramp for stable cosine schedule
    # Fix 1a: Weight raised from 0.05 → 0.3 so vMF genuinely shapes the hypersphere.
    # At 0.05, the vMF signal was dominated by Dice-CE and had no gradient leverage.
    max_weight: 0.3
    # Fix 1a: Cosine schedule for smooth gradient signal (vs. hard linear ramp).
    schedule: "cosine"

    # CRITICAL: Must be False so memory is ready at step 9600
    delay_memory_updates: False
  
  use_memory_bank: True  
  memory_size: 500